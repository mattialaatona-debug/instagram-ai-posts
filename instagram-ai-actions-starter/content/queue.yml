  - id: focus-001
    topic: "Sistemi semplici battono motivazione intermittente"
    prompt: "A refined editorial square image about calm productivity systems, a tidy desk, morning light, subtle visual metaphor of small repeatable actions compounding over time. No readable text."
    caption: |
      I sistemi semplici vincono perche' riducono l'attrito.

      Non devi ricordarti di essere costante: devi costruire un percorso dove la prossima azione e' ovvia.

