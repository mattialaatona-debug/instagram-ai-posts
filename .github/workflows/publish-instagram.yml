name: Resend Telegram preview

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: Generated post id to send again on Telegram
        required: true
        type: string

permissions:
  contents: read

jobs:
  resend:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send selected post again
        run: python src/telegram_preview.py --post-id "${{ inputs.post_id }}"
