name: Generate Instagram image

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: Optional content queue id to generate
        required: false
        type: string
  schedule:
    - cron: "15 8 * * 1,3,5"

permissions:
  contents: write

concurrency:
  group: instagram-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL }}
      BRAND_STYLE: ${{ vars.BRAND_STYLE }}
      PUBLIC_ASSET_BASE_URL: ${{ secrets.PUBLIC_ASSET_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate image asset
        run: python src/generate_instagram_post.py

      - name: Commit generated image
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add generated state/posts.json
          git diff --cached --quiet || git commit -m "Generate Instagram image"
          git pull --rebase origin main
          git push origin main

      - name: Send Telegram preview
        run: python src/telegram_preview.py
