name: Generate Instagram image

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: Optional content queue id to generate
        required: false
        type: string
  schedule:
    - cron: "15 8 * * 1,3,5"

permissions:
  contents: write

concurrency:
  group: instagram-generation
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_IMAGE_MODEL: ${{ vars.OPENAI_IMAGE_MODEL || 'gpt-image-1' }}
      BRAND_STYLE: ${{ vars.BRAND_STYLE || 'clean editorial Instagram post, modern, warm, high contrast, no tiny text' }}
      PUBLIC_ASSET_BASE_URL: ${{ secrets.PUBLIC_ASSET_BASE_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      -
